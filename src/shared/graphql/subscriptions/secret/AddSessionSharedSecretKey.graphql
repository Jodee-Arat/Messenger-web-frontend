subscription AddSessionSharedSecretKey(
  $userId: String!
  $secretSessionId: String!
) {
  addSessionSharedSecretKey(
    userId: $userId
    secretSessionId: $secretSessionId
  ) {
    id
    groupId
    chatId
    fromUserId
    toUserId
    fromSessionId
    toSessionId
    ikPub
    ekPub
    usedOpk
    ukm
    iv
    encryptedKey
    sig
    createdAt
    updatedAt
  }
}
