subscription AddSessionSecretMessage($userId: String!, $secretSessionId: String!) {
  addSessionSecretMessage(userId: $userId, secretSessionId: $secretSessionId) {
    id
    groupId
    isKey
    chatId
    fromUserId
    fromSessionId
    toUserIds
    toSessionIds
    whoCheckedIds
    checkedSessionIds
    ukm
    iv
    encryptedMessage
    sig
    secretAttachmentIds
    ikPub
    ekPub
    usedOpk
    createdAt
    updatedAt
  }
}
