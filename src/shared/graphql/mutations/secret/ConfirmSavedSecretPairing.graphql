mutation ConfirmSavedSecretPairing(
  $pairingId: String!
  $mobileSecretSessionId: String!
  $challenge: String
  $safetyCode: String
) {
  confirmSavedSecretPairing(
    pairingId: $pairingId
    mobileSecretSessionId: $mobileSecretSessionId
    challenge: $challenge
    safetyCode: $safetyCode
  ) {
    pairingId
    userId
    chatId
    webSecretSessionId
    mobileSecretSessionId
    challenge
    safetyCode
    expiresAt
    confirmedAt
  }
}
