mutation SendSessionSecretMessage($data: SessionSecretMessageInput!) {
  sendSessionSecretMessage(data: $data) {
    id
    groupId
    isKey
    chatId
    fromUserId
    fromSessionId
    toUserIds
    toSessionIds
    whoCheckedIds
    checkedSessionIds
    ukm
    iv
    encryptedMessage
    sig
    secretAttachmentIds
    ikPub
    ekPub
    usedOpk
    createdAt
    updatedAt
  }
}
