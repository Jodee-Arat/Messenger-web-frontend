mutation SendSessionSharedSecretKey($data: SessionSharedSecretKeyInput!) {
  sendSessionSharedSecretKey(data: $data) {
    id
    groupId
    chatId
    fromUserId
    toUserId
    fromSessionId
    toSessionId
    ikPub
    ekPub
    usedOpk
    ukm
    iv
    encryptedKey
    sig
    createdAt
    updatedAt
  }
}
