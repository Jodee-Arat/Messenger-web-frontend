mutation CreateSavedSecretPairing($webSecretSessionId: String!) {
  createSavedSecretPairing(webSecretSessionId: $webSecretSessionId) {
    pairingId
    userId
    chatId
    webSecretSessionId
    mobileSecretSessionId
    challenge
    safetyCode
    qrPayload
    qrCodeUrl
    createdAt
    expiresAt
    confirmedAt
  }
}
