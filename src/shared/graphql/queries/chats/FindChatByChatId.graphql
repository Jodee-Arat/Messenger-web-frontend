query FindChatByChatId($chatId: String!) {
  findChatByChatId(chatId: $chatId) {
    chatName
    avatarUrl
    updatedAt
    isSecret
    isGroup
    description
    pinnedMessage {
      id
      text
      createdAt
      isEdited
      isStarted
      files {
        fileName
        fileFormat
        fileSize
        id
      }
      chat {
        chatName
      }
      user {
        id
        username
        avatarUrl
      }
      repliedToLinks {
        id
        repliedTo {
          id
          text
          files {
            fileName
            fileFormat
            fileSize
            id
          }
          user {
            username
            id
            avatarUrl
          }
        }
      }
    }
    draftMessages {
      editId
      id
      text
      files {
        fileName
        fileFormat
        fileSize
        id
      }
      repliedToLinks {
        id
        repliedTo {
          id
          text
          files {
            fileName
            fileFormat
            fileSize
            id
          }
          user {
            username
            id
          }
        }
      }
    }
    members {
      id
      isCreator
      user {
        id
        username
        avatarUrl
      }
      roles {
        id
        name
        color
        permissions
      }
    }
  }
}
