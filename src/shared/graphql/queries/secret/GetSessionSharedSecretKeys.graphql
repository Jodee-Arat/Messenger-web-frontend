query GetSessionSharedSecretKeys($chatId: String!, $secretSessionId: String!) {
  getSessionSharedSecretKeys(
    chatId: $chatId
    secretSessionId: $secretSessionId
  ) {
    id
    groupId
    chatId
    fromUserId
    toUserId
    fromSessionId
    toSessionId
    ikPub
    ekPub
    usedOpk
    ukm
    iv
    encryptedKey
    sig
    createdAt
    updatedAt
  }
}
