query FindGroupByGroupId($groupId: String!) {
  findGroupByGroupId(groupId: $groupId) {
    id
    groupName
    avatarUrl
    description
    members {
      isCreator
      user {
        id
        username
        avatarUrl
      }
      roles {
        id
        name
        color
        permissions
      }
    }
  }
}
